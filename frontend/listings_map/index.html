<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryokan Listing Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel">
        <h1>Ryokan Listing Map</h1>

        <section class="filters">
          <h2>Filters</h2>

          <label for="filter-property-number">Property Number</label>
          <input id="filter-property-number" type="text" placeholder="e.g. 70023" />

          <label for="filter-property-name">Property Name</label>
          <input
            id="filter-property-name"
            type="text"
            placeholder="name contains..."
          />

          <label for="filter-price-min">Price JPY Min</label>
          <input id="filter-price-min" type="number" min="0" step="1" placeholder="0" />

          <label for="filter-price-max">Price JPY Max</label>
          <input id="filter-price-max" type="number" min="0" step="1" placeholder="200000000" />

          <label for="filter-url">URL</label>
          <input id="filter-url" type="text" placeholder="url contains..." />

          <label for="filter-reno-status">Reno Status</label>
          <input id="filter-reno-status" type="text" placeholder="reno status contains..." />

          <label class="checkbox-row shortlist-filter-row">
            <input type="checkbox" id="filter-shortlist" />
            <span>&#9733; Shortlisted only</span>
          </label>

          <label class="checkbox-row shortlist-filter-row">
            <input type="checkbox" id="filter-have-licence" />
            <span>Have licence only</span>
          </label>

          <h3 class="subheading">License Type</h3>
          <div class="eligibility-filter">
            <label class="checkbox-row">
              <input
                type="checkbox"
                class="filter-eligibility"
                value="SIMPLE LODGING"
                checked
              />
              <span><span class="dot c-simple"></span>Simple Lodging (365 days)</span>
            </label>
            <label class="checkbox-row">
              <input
                type="checkbox"
                class="filter-eligibility"
                value="MINPAKU"
                checked
              />
              <span><span class="dot c-minpaku"></span>Minpaku (180 days)</span>
            </label>
            <label class="checkbox-row">
              <input
                type="checkbox"
                class="filter-eligibility"
                value="SPECIAL ZONE"
                checked
              />
              <span><span class="dot c-special"></span>Special Zone (365 days)</span>
            </label>
            <label class="checkbox-row">
              <input
                type="checkbox"
                class="filter-eligibility"
                value="UNCERTAIN / MISSING"
                checked
              />
              <span><span class="dot c-uncertain-new"></span>Uncertain / Missing</span>
            </label>
          </div>

          <button id="clear-filters" type="button">Clear Filters</button>
        </section>

        <section class="legend">
          <h2>License Type</h2>
          <ul>
            <li><span class="dot c-simple"></span>Simple Lodging (365 days/yr)</li>
            <li><span class="dot c-minpaku"></span>Minpaku (180 days/yr)</li>
            <li><span class="dot c-special"></span>Special Zone (365 days/yr)</li>
            <li><span class="dot c-uncertain-new"></span>Uncertain / Missing</li>
          </ul>
        </section>

        <section class="status">
          <h2>Status</h2>
          <p id="status-text">Initializing...</p>
          <p id="visible-count"></p>
        </section>
      </aside>

      <main class="map-wrap">
        <div id="map"></div>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
